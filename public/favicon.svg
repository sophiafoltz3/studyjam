  <rect x="38.5" y="31" width="9" height="16" rx="4.5" fill="url(#metal)" />

  <rect x="18.5" y="33.5" width="5" height="9.5" rx="2.5" fill="#8b5cf6" fill-opacity="0.35" />
  <rect x="40.5" y="33.5" width="5" height="9.5" rx="2.5" fill="#8b5cf6" fill-opacity="0.35" />

  <circle cx="24" cy="46.5" r="2" fill="#ffffff" fill-opacity="0.9" />
  <circle cx="40" cy="46.5" r="2" fill="#ffffff" fill-opacity="0.9" />
