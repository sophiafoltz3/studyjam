<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title>StudyJam headphones logo</title>
  <desc>Rounded square StudyJam icon with stylized headphones.</desc>
  <defs>
    <linearGradient id="bg" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff7eb6" />
      <stop offset="0.5" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#5eead4" />
    </linearGradient>
    <linearGradient id="metal" x1="18" y1="18" x2="46" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#dbeafe" />
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#bg)" />
  <rect x="6" y="6" width="52" height="52" rx="16" fill="none" stroke="rgba(255,255,255,0.22)" />

  <path
